<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Galaga</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-page">
      <section class="game-shell" aria-label="Mini Galaga game">
        <header class="topbar">
          <div>
            <p class="eyebrow">HTML / CSS / JavaScript</p>
            <h1>Mini Galaga</h1>
          </div>
          <div class="stats" aria-label="game stats">
            <div class="stat">
              <span>Score</span>
              <strong id="score">0</strong>
            </div>
            <div class="stat">
              <span>Lives</span>
              <strong id="lives">3</strong>
            </div>
            <div class="stat">
              <span>Wave</span>
              <strong id="wave">1</strong>
            </div>
          </div>
        </header>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="840" height="920" aria-label="Galaga canvas game"></canvas>
          <div id="overlay" class="overlay">
            <div class="overlay-panel">
              <p class="state-label" id="stateLabel">Ready</p>
              <h2 id="stateTitle">갤러그 게임 시작</h2>
              <p id="stateText">방향키 또는 A/D로 이동하고 Space로 발사하세요.</p>
              <button id="startButton" type="button">Start</button>
            </div>
          </div>
        </div>

        <footer class="controls">
          <span>Move: ← → / A D</span>
          <span>Shoot: Space</span>
          <span>Pause: P</span>
          <span>Restart: Enter</span>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
